<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Dannie</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      overflow: hidden;
      min-height: 100vh;
      background: radial-gradient(circle at top, #ffd6eb 0%, #ffb8dc 40%, #ff82be 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* FLOATING HEARTS */
    .heart {
      position: absolute;
      color: white;
      opacity: .7;
      animation: float 8s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); }
      to { transform: translateY(-120vh) rotate(360deg); }
    }

    /* CLICK ANYWHERE OVERLAY */
    .click-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
    }

    .click-message {
      background: white;
      padding: 30px 50px;
      border-radius: 60px;
      font-size: 24px;
      font-weight: bold;
      color: #ff4fa3;
      text-align: center;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* MAIN CONTAINER (hidden until click) */
    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 60px;
      gap: 40px;
      z-index: 2;
      display: none;
    }

    .left-side {
      width: 40%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 25px;
    }

    .birthday-image {
      width: 430px;
      height: 430px;
      object-fit: cover;
      border-radius: 30px;
      border: 10px solid white;
      box-shadow: 0 0 25px rgba(255,255,255,.8), 0 0 50px rgba(255,105,180,.7);
      animation: floatPic 3s ease-in-out infinite;
      max-width: 100%;
    }

    @keyframes floatPic {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .instruction {
      color: white;
      font-size: 18px;
      text-align: center;
      text-shadow: 0 0 10px #ff4fa3;
      max-width: 320px;
      line-height: 1.5;
    }

    button {
      padding: 16px 30px;
      border: none;
      border-radius: 50px;
      background: white;
      color: #ff4fa3;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,.2);
      transition: .3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:disabled {
      opacity: .8;
      cursor: not-allowed;
    }

    .right-side {
      width: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    h1 {
      font-size: 58px;
      color: white;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #ff4fa3, 0 0 20px #ff4fa3, 0 0 40px #ff4fa3;
      z-index: 10;
      line-height: 1.2;
    }

    .cake-container {
      transform: scale(1.15);
      position: relative;
      margin-top: 20px;
    }

    .cake {
      position: relative;
      width: 320px;
      height: 300px;
    }

    .plate {
      position: absolute;
      width: 370px;
      height: 28px;
      background: #f2f2f2;
      border-radius: 50%;
      bottom: -10px;
      left: -25px;
      box-shadow: 0 5px 15px rgba(0,0,0,.2);
    }

    .layer {
      position: absolute;
      border-radius: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: inset 0 -12px rgba(0,0,0,.08), 0 8px 18px rgba(0,0,0,.15);
    }

    .bottom {
      width: 320px;
      height: 100px;
      background: #ff69b4;
      bottom: 0;
    }

    .middle {
      width: 250px;
      height: 80px;
      background: #ff8fcf;
      bottom: 90px;
    }

    .top {
      width: 180px;
      height: 65px;
      background: #ffc1e3;
      bottom: 160px;
    }

    .icing {
      position: absolute;
      background: white;
      border-radius: 20px;
      height: 18px;
    }

    .icing1 {
      width: 320px;
      bottom: 90px;
    }

    .icing2 {
      width: 250px;
      bottom: 160px;
      left: 35px;
    }

    .icing3 {
      width: 180px;
      bottom: 220px;
      left: 70px;
    }

    .candle {
      position: absolute;
      width: 16px;
      height: 55px;
      background: repeating-linear-gradient(45deg, white, white 8px, hotpink 8px, hotpink 16px);
      left: 152px;
      bottom: 220px;
      border-radius: 5px;
      z-index: 5;
    }

    .flame {
      position: absolute;
      width: 25px;
      height: 35px;
      background: gold;
      border-radius: 50%;
      top: -30px;
      left: -5px;
      box-shadow: 0 0 15px orange, 0 0 25px gold;
      animation: flicker .15s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.08) rotate(2deg); }
      100% { transform: scale(1) rotate(-2deg); }
    }

    .decor {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px white;
    }

    .message {
      margin-top: 40px;
      font-size: 40px;
      color: white;
      font-weight: bold;
      opacity: 0;
      transform: translateY(20px);
      transition: 1s;
      text-shadow: 0 0 20px #ff4fa3;
      text-align: center;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1200px) {
      .birthday-image { width: 350px; height: 350px; }
      h1 { font-size: 45px; }
      .cake-container { transform: scale(1); }
    }

    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .container { flex-direction: column; padding: 30px 20px; }
      .left-side, .right-side { width: 100%; }
      .birthday-image { width: 320px; height: 320px; }
      h1 { font-size: 38px; }
      .cake-container { transform: scale(.9); }
      .message { font-size: 30px; }
    }

    @media (max-width: 600px) {
      .birthday-image { width: 250px; height: 250px; border-width: 7px; }
      h1 { font-size: 28px; }
      .cake-container { transform: scale(.72); margin-top: -20px; }
      .message { font-size: 24px; }
      .instruction { font-size: 15px; max-width: 250px; }
      button { width: 220px; font-size: 15px; }
    }
    /* ========================================= */
/* RESPONSIVE DESIGN */
/* ========================================= */

@media (max-width: 1200px){

  .container{
    padding:30px;
    gap:30px;
  }

  .birthday-image{
    width:350px;
    height:350px;
  }

  h1{
    font-size:45px;
  }

  .cake-container{
    transform:scale(1);
  }

}

@media (max-width: 900px){

  body{
    overflow-y:auto;
    height:auto;
    min-height:100vh;
    padding:30px 0;
  }

  .container{
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:50px;
    padding:20px;
  }

  .left-side,
  .right-side{
    width:100%;
  }

  .birthday-image{
    width:320px;
    height:320px;
    max-width:90%;
  }

  h1{
    font-size:38px;
    margin-bottom:20px;
  }

  .cake-container{
    transform:scale(.9);
  }

  .message{
    font-size:30px;
    text-align:center;
    padding:0 20px;
  }

  .instruction{
    font-size:16px;
    max-width:280px;
  }

  button{
    font-size:16px;
    padding:14px 24px;
  }

}

@media (max-width: 600px){

  .container{
    gap:30px;
  }

  .birthday-image{
    width:250px;
    height:250px;
    border-width:7px;
  }

  h1{
    font-size:28px;
    line-height:1.3;
    padding:0 10px;
  }

  .cake-container{
    transform:scale(.72);
    margin-top:-20px;
  }

  .message{
    font-size:24px;
    margin-top:10px;
  }

  .instruction{
    font-size:14px;
    max-width:230px;
  }

  button{
    width:220px;
    font-size:15px;
    padding:13px 20px;
  }

  .controls{
    gap:12px;
  }

}

@media (max-width: 400px){

  .birthday-image{
    width:210px;
    height:210px;
  }

  h1{
    font-size:22px;
  }

  .cake-container{
    transform:scale(.58);
    margin-top:-45px;
  }

  .message{
    font-size:20px;
  }

}
  </style>
</head>
<body>

  <!-- CLICK ANYWHERE OVERLAY -->
  <div class="click-overlay" id="clickOverlay">
    <div class="click-message">
      🎵 CLICK ANYWHERE TO START 🎵<br>
      ✨ Happy Birthday Dannie! ✨
    </div>
  </div>

  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" loop preload="auto">
    <source src="image/dannie.mp3" type="audio/mpeg">
  </audio>

  <!-- FLOATING HEARTS -->
  <script>
    for (let i = 0; i < 30; i++) {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 30) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
    }
  </script>

  <!-- MAIN CONTENT -->
  <div class="container" id="container">
    <div class="left-side">
      <img src="image/Dannie.jpg" class="birthday-image" alt="Dannie">
      <div class="controls">
        <div class="instruction">
          Blow into your microphone to extinguish the candle 💨
        </div>
        <button id="startBtn">
          Enable Microphone 🎤
        </button>
      </div>
    </div>

    <div class="right-side">
      <h1>🎉 HAPPY BIRTHDAY, DANNIE!!! 🎉</h1>

      <div class="cake-container">
        <div class="cake">
          <div class="plate"></div>
          <div class="layer bottom"></div>
          <div class="icing icing1"></div>
          <div class="layer middle"></div>
          <div class="icing icing2"></div>
          <div class="layer top"></div>
          <div class="icing icing3"></div>
          <div class="decor" style="bottom:25px; left:40px;"></div>
          <div class="decor" style="bottom:25px; right:40px;"></div>
          <div class="decor" style="bottom:110px; left:60px;"></div>
          <div class="decor" style="bottom:110px; right:60px;"></div>
          <div class="decor" style="bottom:185px; left:110px;"></div>
          <div class="candle">
            <div class="flame" id="flame"></div>
          </div>
        </div>
      </div>

      <div class="message" id="message">
        🎂 Make a wish, Dannie! 🎂
      </div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const flame = document.getElementById("flame");
    const message = document.getElementById("message");
    const music = document.getElementById("bgMusic");
    const container = document.getElementById("container");
    const overlay = document.getElementById("clickOverlay");

    let analyser;
    let dataArray;
    let blowDetectionRunning = false;

    // WHEN USER CLICKS ANYWHERE - MUSIC AUTOPLAYS + CONTENT SHOWS
    overlay.addEventListener("click", function() {
      // Play music
      music.volume = 0.5;
      music.play().then(() => {
        console.log("🎵 Music is playing!");
      }).catch((err) => {
        console.log("Music error:", err);
      });
      
      // Show the main content
      container.style.display = "flex";
      // Hide the overlay
      overlay.style.display = "none";
    });

    // MICROPHONE BUTTON
    startBtn.addEventListener("click", async () => {
      try {
        // Make sure music is still playing (if not, try again)
        if (music.paused) {
          music.play().catch(e => console.log("Music resume failed"));
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }
        
        analyser = audioContext.createAnalyser();
        const microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        
        blowDetectionRunning = true;
        detectBlow();
        
        startBtn.innerHTML = "Microphone Enabled ✅";
        startBtn.disabled = true;
        
      } catch (err) {
        alert("Microphone access denied!");
        console.log(err);
      }
    });

    function detectBlow() {
      if (!blowDetectionRunning) return;
      requestAnimationFrame(detectBlow);
      
      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
        
        if (volume > 45 && flame.style.display !== "none") {
          flame.style.display = "none";
          message.classList.add("show");
          blowDetectionRunning = false;
        }
      }
    }
  </script>

</body>
</html>
